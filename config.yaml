baseurl: "https://hafismuh.github.io/"
languageCode: "en-us"
title: "Fizz."
theme: "hugo-tania"
paginate: 6


#disqusShortname: https-hugo-tania-netlify-app

params:
  # Emoji will show before the blog title on site navbar.
  titleEmoji:

  # Logo will show before the blog title on site navbar.
  titleLogo: favicon.ico
  
  # Enable float footnotes.
  # Default to true
  enableFootnotes: true
  
  #siteName: "Hugo Tania is Amazing"
  #siteDesc: "Hugo is Absurdly Fast!"
  author: "Fizz"

  colorScheme:
    # Enable toggle colorScheme
    # Default to true
    toggle: true
    # Default colorScheme
    # Default to auto
    default: auto

  # Limit how many categories filter show above search input.
  # Default to 5
  maxCategoryToShow: 10

  # Show your socail information with icon on index bio with `_index.md` content.
  socialOptions:
    github: https://github.com/hafismuh
    linkedin: https://linkedin.com/in/hafismuh
    medium: https://medium.com/@fizh

  
  # Comments settings
  
menu:
  header:
    - name: Articles
      url: "/articles/"
  footer:
    - name: RSS
      url: "/index.xml"
    

markup:
  highlight:
    noClasses: false
    lineNos: true
  goldmark:
    renderer:
      unsafe: true

outputs:
  home: ["HTML", "RSS", "JSON"]

  